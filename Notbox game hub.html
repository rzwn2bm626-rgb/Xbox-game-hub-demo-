<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xbox Dashboard Ecosystem</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #333;
      --glass: rgba(22, 22, 25, 0.6);
      --glass-hover: rgba(35, 35, 40, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --text: #eff4ff;
      --muted: #888890; 
      --accent: #107c10; 
      --tile-size: 240px; 
    }

    body {
      display: grid;
      min-height: 100vh;
      grid-template-columns: 400px 1fr;
      grid-gap: 0 50px;
      background: #333;
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: normal;
      color: var(--text);
      margin: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 2px solid #555;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      z-index: 100;
    }

    nav ul {
      margin-top: 100px;
      padding-left: 0;
      list-style: none;
    }

    nav ul li {
      position: relative;
      padding-left: 50px;
      padding-top: 15px;
      padding-bottom: 15px;
      cursor: pointer;
      font-size: 18px;
    }

    nav ul li::after {
      display: block;
      position: absolute;
      content: attr(data-count);
      text-align: right;
      width: 320px;
      top: 0;
      padding-top: 15px;
      padding-bottom: 15px;
    }

    nav ul li.selected {
      background: #555;
      border-right: 10px solid var(--accent);
    }

    nav ul li:hover {
      background: var(--accent);
      box-shadow: 0 0 20px 0 var(--accent);
    }

    .dashboard-container {
      display: flex;
      flex-direction: column;
      padding-right: 50px;
    }

    .options {
      padding-top: 40px;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
    }

    .search-box {
      width: 100%;
      max-width: 610px;
      border: 0;
      background: #444;
      color: #eff4ff;
      padding: 12px 20px;
      font-size: 20px;
      font-family: inherit;
      outline: none;
      border-radius: 0px;
    }

    .search-box:focus {
      outline: 5px solid var(--accent);
      box-shadow: 0 0 15px 5px var(--accent);
    }

    .tiles {
      column-count: auto;
      column-width: var(--tile-size);
      column-gap: 25px;
      width: 100%;
      padding-bottom: 50px;
    }

    .tiles .tile {
      break-inside: avoid;
      display: inline-block;
      width: 100%;
      margin-bottom: 25px; 
      position: relative;
      background: #222; 
      cursor: pointer;
      overflow: hidden;
      border-radius: 0px; 
      border: 1px solid var(--border);
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .tiles .tile.shape-square {
      aspect-ratio: 1 / 1;
    }

    .tiles .tile.shape-poster {
      aspect-ratio: 2 / 3; 
    }

    .tiles .tile.shape-banner {
      aspect-ratio: 16 / 9; 
    }

    .tiles .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.7;
      transition: 0.5s;
    }

    .tiles .tile .text-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: #aaa;
      z-index: 2;
    }

    .tiles .tile:hover {
      transform: translateY(-8px);
      outline: 5px solid var(--accent);
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      z-index: 10;
    }

    .tiles .tile:hover img {
      opacity: 1;
      transform: scale(1.05);
    }

    .c-inf {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 50px 25px 25px;
      box-sizing: border-box;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      opacity: 0;
      transform: translateY(15px);
      transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 3;
    }

    .tiles .tile:hover .c-inf {
      opacity: 1;
      transform: translateY(0);
    }

    .c-inf h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px 0;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .c-inf span {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      width: 300px;
      border: 0;
      background: #444;
      color: #eff4ff;
      padding: 10px;
      font-size: 20px;
      border-radius: 0px; 
      font-family: inherit;
    }

    select:hover {
      outline: 5px solid var(--accent);
      box-shadow: 0 0 20px 10px var(--accent);
      z-index: 10;
    }

    #modal-ui {
      position: fixed;
      inset: 0;
      background: #050505;
      z-index: 500;
      display: none;
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
    }

    .m-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 90vh;
      object-fit: cover;
      opacity: 0.25; 
      filter: blur(40px);
      mask-image: linear-gradient(to bottom, black 10%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 100%);
    }

    .m-close {
      position: fixed;
      top: 40px;
      right: 60px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
      z-index: 10;
    }

    .m-close:hover {
      background: #fff;
      transform: rotate(90deg) scale(1.05);
    }

    .m-close:hover svg {
      stroke: #000;
    }

    .m-grid {
      position: relative;
      z-index: 2;
      padding: 100px;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 70px;
      align-items: flex-start;
    }

    .m-l {
      width: 340px;
      flex-shrink: 0;
    }

    .m-l img {
      width: 100%;
      border-radius: 0px; 
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
      border: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .m-play {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      padding: 20px 0;
      font-size: 15px;
      font-weight: 700;
      border-radius: 0px; 
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .m-play:hover {
      background: #e0e0e0;
      box-shadow: 0 10px 25px rgba(255,255,255,0.15);
      transform: translateY(-3px);
    }

    .m-stats {
      background: rgba(20,20,20,0.4);
      border: 1px solid var(--border);
      border-radius: 0px; 
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(15px);
    }

    .m-rw {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .m-rw small {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .m-rw span {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }

    .m-r {
      flex: 1;
      padding-top: 10px;
    }

    .m-t {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -3px;
      margin: 0 0 10px 0;
      line-height: 1;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: #fff;
    }

    .m-d {
      font-size: 16px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 500;
      margin-bottom: 35px;
    }

    .m-tgs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 35px;
    }

    .m-tg {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 0px; 
      font-size: 12px;
      font-weight: 500;
      color: #ccc;
    }

    .m-desc {
      font-size: 16px;
      line-height: 1.7;
      color: #aaa;
      margin-bottom: 50px;
      max-width: 850px;
      font-weight: 300;
    }

    .m-req {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      border-top: 1px solid var(--border);
      padding-top: 40px;
    }

    .m-rc h4 {
      font-size: 14px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 0 20px 0;
      font-weight: 600;
    }

    .m-ri {
      margin-bottom: 15px;
    }

    .m-ri small {
      display: block;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .m-ri span {
      display: block;
      font-size: 13px;
      color: #ccc;
      font-weight: 400;
      line-height: 1.5;
    }
  </style>
</head>

      <li id="menu-plus" data-count="0" onclick="switchCategory('plus')">Xbox Plus</li>

    </ul>

  <div class="dashboard-container">
    <div class="options">
      <input type="text" id="game-search" class="search-box" placeholder="Search ecosystem..." autocomplete="off">
      
      <div class="controls-row">
        <select id="sort-method">
          <option value="az">Sort A-Z</option>
          <option value="za">Sort Z-A</option>
        </select>
        <select id="tile-size">
          <option value="320px">Large Tiles</option>
          <option value="240px" selected>Medium Tiles</option>
          <option value="160px">Small Tiles</option>
        </select>
      </div>
    </div>

    <div class="tiles" id="tiles-container"></div>
  </div>

  <div id="modal-ui">
    <img src="" class="m-bg" id="m-back-bg">

    <div class="m-close" onclick="closeModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>

    <div class="m-grid">
      <div class="m-l">
        <img src="" id="m-poster">
        <button class="m-play" id="m-play-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          Launch Instance
        </button>

        <div class="m-stats">
          <div class="m-rw">
            <small>Publisher / Dev</small>
            <span id="m-stat-dev">-</span>
          </div>
          <div class="m-rw">
            <small>Storage Size</small>
            <span id="m-stat-size">-</span>
          </div>
        </div>
      </div>

      <div class="m-r">
        <h1 class="m-t" id="m-title">Title</h1>
        <div class="m-d" id="m-developer-sub">PUBLISHER SUBTITLE</div>
        
        <div class="m-tgs" id="m-tags-container"></div>

        <p class="m-desc" id="m-description">Context parameters loading...</p>

        <div class="m-req">
          <div class="m-rc">
            <h4>Minimum Requirements</h4>
            <div class="m-ri"><small>OS</small><span id="req-min-os">-</span></div>
            <div class="m-ri"><small>Processor</small><span id="req-min-cpu">-</span></div>
            <div class="m-ri"><small>Memory</small><span id="req-min-ram">-</span></div>
            <div class="m-ri"><small>Graphics</small><span id="req-min-gpu">-</span></div>
          </div>
          <div class="m-rc">
            <h4>Recommended Requirements</h4>
            <div class="m-ri"><small>OS</small><span id="req-rec-os">-</span></div>
            <div class="m-ri"><small>Processor</small><span id="req-rec-cpu">-</span></div>
            <div class="m-ri"><small>Memory</small><span id="req-rec-ram">-</span></div>
            <div class="m-ri"><small>Graphics</small><span id="req-rec-gpu">-</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

    // =========================================================================

    // Static Placeholder Pools
    const XBOX_PLUS_DATA = [];     
    const NORMAL_XBOX_DATA = [];   

    let poolUltimate = [];
    let poolGamePass = [];
    let poolXboxPlus = [];
    let poolNormalXbox = [];
    let poolApps = [];
    let currentCategory = 'ultimate';

    async function loadDashboardEcosystem() {
      try {
        let rawGamePass = [];

        // Fetching Xbox Game Pass External API Feed
        try {
          const response = await fetch(API_GAMEPASS);
          if (response.ok) {
            const data = await response.json();
            rawGamePass = Array.isArray(data) ? data : (data.games || data.zones || Object.values(data));
          }
        } catch (err) { console.warn("API_GAMEPASS stream unavailable.", err); }

        // Process Game Pass Ultimate (Using Local Relative Folder Architecture)
        poolUltimate = GAME_PASS_ULTIMATE_RAW.map(item => {
          if (!item) return null;
          
          // Force file names to check into the relative /games/ folder structure
          const cleanFileName = item.file_name.startsWith('games/') ? item.file_name : `games/${item.file_name}`;
          
          // Fallback check if thumb entry is using the old 'thumbs/' prefix path instead of 'thumbnails/'
          let correctThumb = item.thumb || "";
          if (correctThumb.startsWith('thumbs/')) {
             correctThumb = correctThumb.replace('thumbs/', 'thumbnails/');
          }

          return {
            id: 'ultimate-' + item.title.toLowerCase().replace(/[^a-z0-9]/g, ''),
            title: item.title,
            developer: "Local Package Studio",
            url: cleanFileName,         // Relative local file routing paths
            image: correctThumb,        // Relative local image paths
            background: correctThumb,   // Use local thumbnail asset for panel bg blurred filters
            size: "Offline Native Module",
            desc: `Local directory package instance for ${item.title}. Loaded out of system storage partition execution stacks safely.`,
            tags: ["Ultimate Pack", "Local File"],
            sourcePool: 'ultimate',
            rm: { os: "Local Host Environment", cpu: "Any", ram: "Any", gpu: "Any" },
            rr: { os: "Local Host Environment", cpu: "Any", ram: "Any", gpu: "Any" }
          };
        }).filter(Boolean);

        // Process Xbox Game Pass (Using External API Configurations)
        poolGamePass = rawGamePass.map(item => {
          if (!item) return null;
          const name = item.name || item.Name || "Xbox Title";
          const id = item.id || item.filename || name;
          return {
            id: id,
            title: name,
            developer: item.developer || item.dev || "Xbox Partner Studio",
            url: `${HTML_GAMEPASS}${item.html || item.Html || item.link || `${id}.html`}`,
            image: `${COVER_GAMEPASS}${item.image || item.Image || item.img || `${id}.png`}`,
            background: item.background || item.bg || `${COVER_GAMEPASS}${item.image || item.Image || item.img || `${id}.png`}`, 
            size: "Standard Pass Stream",
            desc: item.desc || item.description || "External live cloud catalog data description feed missing.",
            tags: item.tags || ["Game Pass"],
            sourcePool: 'gamepass',
            rm: item.rm || item.req?.min || { os: "Windows 10", cpu: "Intel i5", ram: "8 GB", gpu: "GTX 1050" },
            rr: item.rr || item.req?.rec || { os: "Windows 11", cpu: "Intel i7", ram: "16 GB", gpu: "RTX 2060" }
          };
        }).filter(Boolean);

        // Process Xbox Plus
        poolXboxPlus = XBOX_PLUS_DATA.map(game => {
          return {
            id: game.id,
            title: game.n,
            developer: game.dev,
            url: game.url,
            image: game.img,
            background: game.bg, 
            size: "Xbox Cloud Instance",
            desc: game.desc || "No description provided.",
            tags: game.tags || ["Xbox Plus"],
            sourcePool: 'plus',
            rm: game.rm || { os: "Windows 10", cpu: "Intel i5", ram: "8 GB", gpu: "GTX 1050" },
            rr: game.rr || { os: "Windows 11", cpu: "Intel i7", ram: "16 GB", gpu: "RTX 2060" }
          };
        });

        // Process Normal Xbox
        poolNormalXbox = NORMAL_XBOX_DATA.map(game => {
          return {
            id: game.id || Math.random().toString(36).substr(2, 9),
            title: game.title || game.n || "Normal Xbox Game",
            developer: game.developer || game.dev || "Legacy Studios",
            url: game.url || game.link || "#",
            image: game.image || game.img || game.background || game.bg || "",
            background: game.background || game.bg || game.image || game.img || "",
            size: "Native System App",
            desc: game.desc || "Legacy runtime component environment.",
            tags: game.tags || ["Console"],
            sourcePool: 'normal_xbox',
            rm: game.rm || { os: "Any", cpu: "Any", ram: "Any", gpu: "Any" },
            rr: game.rr || { os: "Any", cpu: "Any", ram: "Any", gpu: "Any" }
          };
        });

        // Parse and process embedded JSON payload for Apps Area
        try {
          const parsedAppsData = JSON.parse(APPS_JSON_DATA);
          const activeAppCDN = parsedAppsData.config.base_cdn_url;

          poolApps = parsedAppsData.apps.map(app => {
            const appId = app.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            const calculatedLogo = `${activeAppCDN}${app.image}`;

            return {
              id: appId,
              title: app.name,
              developer: app.genre || "Application",
              url: app.url,
              image: calculatedLogo, 
              background: calculatedLogo,
              size: "App Hub Client",
              desc: `Web client module for ${app.name}. Category: ${app.genre}.`,
              tags: [app.genre, app.type || "Web App"].filter(Boolean),
              sourcePool: 'apps',
              rm: { os: "Web Browser", cpu: "Any", ram: "Any", gpu: "Any" },
              rr: { os: "Web Browser", cpu: "Any", ram: "Any", gpu: "Any" }
            };
          });
        } catch (jsonErr) {
          console.error("Error parsing embedded APPS_JSON_DATA payload:", jsonErr);
        }

        // Safety filters
        poolUltimate = poolUltimate.filter(filterSafety);
        poolGamePass = poolGamePass.filter(filterSafety);
        poolXboxPlus = poolXboxPlus.filter(filterSafety);
        poolNormalXbox = poolNormalXbox.filter(filterSafety);
        poolApps = poolApps.filter(filterSafety);

        // Update Nav Menu Badges
        document.getElementById('menu-ultimate').setAttribute('data-count', poolUltimate.length);
        document.getElementById('menu-gamepass').setAttribute('data-count', poolGamePass.length);
        document.getElementById('menu-plus').setAttribute('data-count', poolXboxPlus.length);
        document.getElementById('menu-normal-xbox').setAttribute('data-count', poolNormalXbox.length);
        document.getElementById('menu-apps').setAttribute('data-count', poolApps.length);

        displayEcosystemItems();

      } catch (error) {
        console.error("Dashboard Lifecycle Error:", error);
      }
    }

    function filterSafety(item) {
      const titleLower = (item.title || "").toLowerCase();
      const urlLower = (item.url || "").toLowerCase();
      return !titleLower.includes('bowmasters') && !urlLower.includes('bowmasters') &&
             !titleLower.includes('suggest games') && !urlLower.includes('d4c9vfywyu');
    }

    function displayEcosystemItems(customFilteredPool = null) {
      const tilesContainer = document.getElementById('tiles-container');
      tilesContainer.innerHTML = '';

      let activePool = customFilteredPool;
      if (!activePool) {
        if (currentCategory === 'ultimate') activePool = poolUltimate;
        else if (currentCategory === 'gamepass') activePool = poolGamePass;
        else if (currentCategory === 'plus') activePool = poolXboxPlus;
        else if (currentCategory === 'normal_xbox') activePool = poolNormalXbox;
        else activePool = poolApps;
      }

      const sortMethod = document.getElementById('sort-method').value;
      activePool.sort((a, b) => {
        return sortMethod === 'az' ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title);
      });

      activePool.forEach(item => {
        const tile = document.createElement('div');
        
        if (item.sourcePool === 'plus') tile.className = 'tile shape-poster'; 
        else if (item.sourcePool === 'normal_xbox') tile.className = 'tile shape-banner'; 
        else if (item.sourcePool === 'apps') tile.className = 'tile shape-banner'; 
        else tile.className = 'tile shape-square'; // Ultimate and Game Pass use square mode

        tile.onclick = () => openModal(item.id);

        const imageToDisplay = (item.sourcePool === 'normal_xbox') ? (item.background || item.image) : item.image;

        if (imageToDisplay && imageToDisplay.trim() !== "") {
          const img = document.createElement('img');
          img.src = imageToDisplay;
          img.alt = item.title;
          tile.appendChild(img);
        } else {
          const textPlaceholder = document.createElement('div');
          textPlaceholder.className = 'text-placeholder';
          textPlaceholder.innerText = item.title;
          tile.appendChild(textPlaceholder);
        }
        
        const info = document.createElement('div');
        info.className = 'c-inf';
        info.innerHTML = `<h3>${item.title}</h3><span>${item.developer}</span>`;
        
        tile.appendChild(info);
        tilesContainer.appendChild(tile);
      });
    }

    function switchCategory(category) {
      currentCategory = category;
      document.getElementById('menu-ultimate').classList.remove('selected');
      document.getElementById('menu-gamepass').classList.remove('selected');
      document.getElementById('menu-plus').classList.remove('selected');
      document.getElementById('menu-normal-xbox').classList.remove('selected');
      document.getElementById('menu-apps').classList.remove('selected');
      
      if (category === 'ultimate') document.getElementById('menu-ultimate').classList.add('selected');
      else if (category === 'gamepass') document.getElementById('menu-gamepass').classList.add('selected');
      else if (category === 'plus') document.getElementById('menu-plus').classList.add('selected');
      else if (category === 'normal_xbox') document.getElementById('menu-normal-xbox').classList.add('selected');
      else document.getElementById('menu-apps').classList.add('selected');

      document.getElementById('game-search').value = '';
      displayEcosystemItems();
    }

    function launchInstance(item, isPlusInstance) {
      const newWindow = window.open('about:blank', '_blank');
      if (!newWindow) {
        alert("Pop-up blocked! Access denied by window supervisor engine.");
        return;
      }

      const doc = newWindow.document;
      let finalHTMLContent = '';

      if (isPlusInstance) {
        finalHTMLContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <title>Launcher - ${item.title}</title>
            <style>
              body, html { margin:0; padding:0; width:100%; height:100%; background:#000; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; color:#fff; }
              .launcher-overlay { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; background:linear-gradient(rgba(0,0,0,0.5), #050505); transition: opacity 0.8s ease; }
              .bg-blur { position:absolute; inset:0; background-image:url('${item.background}'); background-size:cover; background-position:center; filter:blur(20px); opacity:0.4; z-index:1; }
              .panel { position:relative; z-index:15; text-align:center; max-width:600px; padding:40px; }
              .title { font-size:48px; font-weight:800; margin:0 0 10px 0; text-transform:uppercase; letter-spacing:-1px; }
              .dev { font-size:16px; color:#107c10; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:30px; }
              .status-spinner { width:50px; height:50px; border:5px solid #222; border-top:5px solid #107c10; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px; }
              .status-text { font-size:14px; color:#888; text-transform:uppercase; letter-spacing:1px; }
              iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; z-index:5; background:#000; }
              @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
            </style>
          </head>
          <body>
            <div class="bg-blur"></div>
            <div class="launcher-overlay" id="loader">
              <div class="panel">
                <div class="status-spinner"></div>
                <h1 class="title">${item.title}</h1>
                <div class="dev">${item.developer}</div>
                <div class="status-text">Connecting to Server Instance...</div>
              </div>
            </div>
            <iframe src="${item.url}" onload="setTimeout(() => { document.getElementById('loader').style.opacity='0'; setTimeout(()=>document.getElementById('loader').remove(), 800); }, 2500)"></iframe>
          </body>
          </html>
        `;
      } else {
        finalHTMLContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <title>${item.title}</title>
            <style>
              body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
              iframe { width:100%; height:100%; border:none; display:block; }
            </style>
          </head>
          <body>
            <iframe src="${item.url}"></iframe>
          </body>
          </html>
        `;
      }

      doc.open();
      doc.write(finalHTMLContent);
      doc.close();
    }

    function openModal(itemId) {
      const allPools = [...poolUltimate, ...poolGamePass, ...poolXboxPlus, ...poolNormalXbox, ...poolApps];
      const item = allPools.find(x => x.id === itemId);
      if (!item) return;

      const isPlusInstance = poolXboxPlus.some(x => x.id === itemId);

      document.getElementById('m-back-bg').src = item.background || '';
      document.getElementById('m-poster').src = item.image || '';
      document.getElementById('m-title').innerText = item.title;
      document.getElementById('m-developer-sub').innerText = item.developer;
      document.getElementById('m-description').innerText = item.desc;
      
      document.getElementById('m-stat-dev').innerText = item.developer;
      document.getElementById('m-stat-size').innerText = item.size;

      const playBtn = document.getElementById('m-play-btn');
      playBtn.onclick = () => {
        closeModal();
        launchInstance(item, isPlusInstance);
      };

      const tagsContainer = document.getElementById('m-tags-container');
      tagsContainer.innerHTML = '';
      item.tags.forEach(t => {
        const tagSpan = document.createElement('span');
        tagSpan.className = 'm-tg';
        tagSpan.innerText = t;
        tagsContainer.appendChild(tagSpan);
      });

      document.getElementById('req-min-os').innerText = item.rm.os;
      document.getElementById('req-min-cpu').innerText = item.rm.cpu;
      document.getElementById('req-min-ram').innerText = item.rm.ram;
      document.getElementById('req-min-gpu').innerText = item.rm.gpu;

      document.getElementById('req-rec-os').innerText = item.rr.os;
      document.getElementById('req-rec-cpu').innerText = item.rr.cpu;
      document.getElementById('req-rec-ram').innerText = item.rr.ram;
      document.getElementById('req-rec-gpu').innerText = item.rr.gpu;

      const modal = document.getElementById('modal-ui');
      modal.style.display = 'block';
      setTimeout(() => { modal.style.opacity = '1'; }, 10);
    }

    function closeModal() {
      const modal = document.getElementById('modal-ui');
      modal.style.opacity = '0';
      setTimeout(() => { document.getElementById('modal-ui').style.display = 'none'; }, 400);
    }

    document.getElementById('tile-size').addEventListener('change', (e) => {
      document.documentElement.style.setProperty('--tile-size', e.target.value);
    });

    document.getElementById('sort-method').addEventListener('change', () => {
      displayEcosystemItems();
    });

    document.getElementById('game-search').addEventListener('input', (event) => {
      const searchQuery = event.target.value.toLowerCase().trim();
      let currentPool = [];
      if (currentCategory === 'ultimate') currentPool = poolUltimate;
      else if (currentCategory === 'gamepass') currentPool = poolGamePass;
      else if (currentCategory === 'plus') currentPool = poolXboxPlus;
      else if (currentCategory === 'normal_xbox') currentPool = poolNormalXbox;
      else currentPool = poolApps;
      
      const filteredResults = currentPool.filter(x => x.title.toLowerCase().includes(searchQuery));
      displayEcosystemItems(filteredResults);
    });

    // Run Engine
    loadDashboardEcosystem();
  </script>
